services:
  - type: web
    name: aschat-backend
    runtime: node
    plan: starter
    rootDir: aschat-server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/test
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 5
    envVars:
      - key: CLIENT_URL
        fromService:
          name: aschat-client
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: OTP_LOGIN_ENABLED
        value: "false"
      - key: UPLOADS_DIR
        value: /opt/render/project/src/uploads

  - type: web
    name: aschat-client
    runtime: static
    plan: free
    rootDir: aschat-client
    buildCommand: npm install && npm run build
    staticPublishPath: aschat-client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: aschat-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_SERVER_URL
        fromService:
          name: aschat-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_SERVER_ORIGIN
        fromService:
          name: aschat-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_SOCKET_URL
        fromService:
          name: aschat-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
